name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Import smoke check
        env:
          # Dummy key so client construction at import time doesn't fail.
          # No real API calls happen in this job.
          ANTHROPIC_API_KEY: sk-ant-ci-dummy
        run: python -c "import main; print('import OK')"