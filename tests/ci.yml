name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Lint
        run: ruff check .

      - name: Tests
        env:
          # Dummy key: the tests never call the API, but importing the app
          # constructs clients at import time. No real requests are made.
          ANTHROPIC_API_KEY: sk-ant-ci-dummy
        run: pytest -q